<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Transcript - The Azure Security Podcast</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="shortcut icon" href="images/favicon-aznew.ico">
        <script src="https://cdn.jsdelivr.net/npm/showdown@1.9.1/dist/showdown.min.js"
                integrity="sha384-TTjj1KxpUMxMChPbgmSWLlfEep0/67X86v9lnJMkldzkQGHZNAhZRgE9owovIRyz"
                crossorigin="anonymous"></script>
        <style>
            body {
                background: #fff;
                font-family: 'opensans-regular', sans-serif;
                font-weight: normal;
                font-size: 15px;
                line-height: 30px;
                color: #000000;
            }
        </style>
    </head>

    <body>

        <div id='root'></div>

        <script>
            document.addEventListener("DOMContentLoaded", function() {
                var urlParams = new URLSearchParams(window.location.search);
                var episode = urlParams.get('ep');
                var epNum = parseInt(episode);

                if (!isNaN(epNum)) {
                    var url = "https://azsecuritypodcast.net/transcripts/transcript" + epNum + ".md";

                    fetch(url)
                        .then(function(response) {
                            if (!response.ok) throw new Error("HTTP " + response.status);
                            return response.text();
                        })
                        .then(function(text) {
                            var converter = new showdown.Converter();
                            document.getElementById('root').innerHTML = converter.makeHtml(text);
                        })
                        .catch(function(err) {
                            document.getElementById('root').innerHTML = '<p>Failed to load transcript.</p>';
                        });
                }
            });
        </script>

    </body>
</html>
